name: Daily Pipeline Data Update

on:
  schedule:
    # Run every day at 02:00 UTC
    - cron: '0 2 * * *'
  # Also allow manual triggering from the GitHub UI
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # We need write permissions to push the new CSVs back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Explicitly checkout the release branch so we commit there
          ref: release
          # Use a Personal Access Token (PAT) instead of the default GITHUB_TOKEN
          # This is required for GitHub to fire the webhook that tells Streamlit to redeploy
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: |
          export DATE_FROM=$(date -d "7 days ago" +'%Y-%m-%d')
          export DATE_TO=$(date -d "1 day ago" +'%Y-%m-%d')
          echo "Running pipeline from $DATE_FROM to $DATE_TO"
          
          # Pass the run date to the next GitHub Action step for the commit message
          echo "RUN_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          
          python -m pipeline.run_pipeline
        
      - name: Commit and push CSV changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated data pipeline update (${{ env.RUN_DATE }})"
          branch: release
          # Only commit files in the data folder to avoid accidentally committing other things
          file_pattern: 'data/*.csv'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
